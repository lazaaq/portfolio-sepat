<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Form Kepuasan | SEPAT – BPS Kab. Tegal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--amber:#d97706;--dk:#1e1e2d;--bg:#F4F3F0;}
*,*::before,*::after{box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);margin:0;}
a{text-decoration:none;color:inherit;}
/* Header */
.hdr{background:#d97706;position:sticky;top:0;z-index:30;padding:.6rem 1.5rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.hdr-brand{display:flex;align-items:center;gap:.7rem;}
.hdr-logo{width:32px;height:32px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.hdr-logo img{width:22px;height:22px;object-fit:contain;}
.hdr-title{color:white;font-weight:700;font-size:.85rem;line-height:1.3;}
.hdr-sub{color:#fde68a;font-size:.62rem;letter-spacing:.04em;}
.hdr-right{display:flex;align-items:center;gap:.7rem;}
.ua{display:flex;align-items:center;gap:.45rem;color:white;font-size:.78rem;cursor:pointer;background:none;border:none;}
.ua-av{width:28px;height:28px;border-radius:50%;background:#92400e;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;color:white;}
/* Layout */
.wrap{display:flex;min-height:calc(100vh - 50px);}
.sb{width:272px;background:#1e1e2d;flex-shrink:0;display:flex;flex-direction:column;padding:.85rem .7rem;}
.sb-logo{display:flex;align-items:center;gap:.6rem;padding:.4rem .6rem .9rem;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:.35rem;}
.sb-lg-icon{font-size:1.4rem;}
.sb-lg-txt{color:white;font-size:.82rem;font-weight:700;line-height:1.2;}
.sb-lg-sub{color:rgba(255,255,255,.45);font-size:.6rem;}
.nb-lbl{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.3);padding:.65rem .6rem .2rem;}
.ni{display:flex;align-items:center;gap:.6rem;padding:.5rem .8rem;border-radius:8px;color:rgba(255,255,255,.65);font-size:.8rem;font-weight:500;transition:all .18s;margin-bottom:2px;}
.ni:hover,.ni.active{background:rgba(217,119,6,.22);color:#fde68a;}
.ni .mi,.ni i{font-size:.95rem;width:17px;text-align:center;}
.mc{flex:1;min-width:0;padding:1.4rem;}
/* Cards */
.card{background:white;border-radius:13px;border:1px solid #e5e7eb;overflow:hidden;margin-bottom:1.2rem;}
.ch{padding:.85rem 1.2rem;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;}
.ch h3{font-size:.92rem;font-weight:700;color:#111827;margin:0;}
.cb{padding:1.2rem;}
/* Stats */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem;margin-bottom:1.4rem;}
.sc{background:white;border-radius:13px;border:1px solid #e5e7eb;padding:1.1rem;}
.si{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;margin-bottom:.65rem;}
.sl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;}
.sv{font-size:1.75rem;font-weight:800;color:#111827;line-height:1.1;}
.ss{font-size:.7rem;color:#9ca3af;margin-top:.15rem;}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem .95rem;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .18s;}
.ba{background:#d97706;color:white;} .ba:hover{background:#b45309;}
.bb{background:#2563eb;color:white;} .bb:hover{background:#1d4ed8;}
.bg{background:#16a34a;color:white;} .bg:hover{background:#15803d;}
.br{background:#dc2626;color:white;} .br:hover{background:#b91c1c;}
.bo{background:white;border:1px solid #d1d5db;color:#374151;} .bo:hover{border-color:#d97706;color:#d97706;}
.bpurp{background:#7c3aed;color:white;} .bpurp:hover{background:#6d28d9;}
/* Tables */
.dt{width:100%;border-collapse:collapse;}
.dt thead tr{background:#d97706;}
.dt thead th{padding:.6rem .9rem;text-align:left;font-size:.7rem;font-weight:700;color:white;text-transform:uppercase;letter-spacing:.05em;}
.dt tbody tr{border-bottom:1px solid #f3f4f6;transition:background .15s;}
.dt tbody tr:hover td{background:#fffbeb!important;}
.dt tbody td{padding:.62rem .9rem;font-size:.82rem;color:#374151;vertical-align:middle;}
.dt tbody tr:nth-child(odd) td{background:#fffbf5;}
.dt tbody tr:nth-child(even) td{background:white;}
/* Badges */
.bd{display:inline-flex;align-items:center;padding:.16rem .6rem;border-radius:9999px;font-size:.68rem;font-weight:700;}
.bd-g{background:#dcfce7;color:#16a34a;}
.bd-b{background:#dbeafe;color:#2563eb;}
.bd-a{background:#fef3c7;color:#d97706;}
.bd-r{background:#fee2e2;color:#dc2626;}
.bd-gr{background:#f3f4f6;color:#6b7280;}
.bd-p{background:#ede9fe;color:#7c3aed;}
.bd-o{background:#ffedd5;color:#c2410c;}
/* Forms */
.fg{margin-bottom:.9rem;}
.fl{display:block;font-size:.78rem;font-weight:600;color:#374151;margin-bottom:.32rem;}
.fl span{color:#ef4444;}
.fi{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:.55rem .8rem;font-size:.83rem;outline:none;font-family:inherit;background:white;transition:border .15s;height:auto!important;border-radius:8px!important;}
.fi:focus{border-color:#d97706;box-shadow:0 0 0 3px rgba(217,119,6,.1);}
.fsel{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:.55rem .8rem;font-size:.83rem;outline:none;font-family:inherit;background:white;height:auto!important;border-radius:8px!important;}
.fta{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:.55rem .8rem;font-size:.83rem;outline:none;font-family:inherit;resize:vertical;min-height:80px;background:white;}
.fta:focus,.fi:focus,.fsel:focus{border-color:#d97706;box-shadow:0 0 0 3px rgba(217,119,6,.1);}
/* Misc */
.demo-badge{position:fixed;bottom:1.2rem;right:1.2rem;z-index:9999;background:#d97706;color:white;padding:4px 13px;border-radius:9999px;font-size:11px;font-weight:700;box-shadow:0 4px 12px rgba(217,119,6,.4);}
.dn{background:#fffbeb;border:1px solid #fde68a;border-radius:9px;padding:.55rem .95rem;font-size:.76rem;color:#92400e;margin-bottom:.95rem;}
.pg{font-size:1.35rem;font-weight:800;color:#111827;margin-bottom:.2rem;}
.ps{font-size:.8rem;color:#6b7280;}
</style>
</head><body>

<div style="min-height:100vh;background:linear-gradient(135deg,#1a56db,#1e3a5f);display:flex;align-items:center;justify-content:center;padding:2rem;">
  <div style="background:white;border-radius:18px;padding:2.25rem;width:100%;max-width:680px;box-shadow:0 20px 40px rgba(0,0,0,.2);">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/28/Badan_Pusat_Statistik.svg/240px-Badan_Pusat_Statistik.svg.png" style="height:44px;margin-bottom:.75rem;" alt="BPS">
      <h2 style="font-size:1.4rem;font-weight:800;color:#111827;margin-bottom:.3rem;">Kepuasan Layanan PST</h2>
      <p style="font-size:.82rem;color:#6b7280;">BPS Kabupaten Tegal — Bantu kami meningkatkan kualitas pelayanan</p>
    </div>
    <div class="dn"><i class="fa fa-triangle-exclamation"></i> <strong>Demo</strong> — Form kepuasan demo — tidak tersimpan ke database.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:1.2rem;">
      <div class="fg"><label class="fl">Nama <span>*</span></label><input type="text" class="fi" placeholder="Nama lengkap"></div>
      <div class="fg"><label class="fl">Nomor HP</label><input type="tel" class="fi" placeholder="08xxxxxxxxxx"></div>
      <div class="fg"><label class="fl">Tujuan Layanan <span>*</span></label><select class="fsel"><option>Konsultasi Statistik</option><option>Perpustakaan</option><option>Rekomendasi Statistik</option></select></div>
      <div class="fg"><label class="fl">Media Akses <span>*</span></label><select class="fsel"><option>Datang Langsung</option><option>Online</option><option>Telepon</option></select></div>
      <div class="fg"><label class="fl">Petugas</label><select class="fsel"><option>Ahmad Fauzi</option><option>Siti Rahayu</option><option>Budi Santoso</option></select></div>
      <div class="fg"><label class="fl">Jumlah Petugas</label><input type="number" class="fi" value="1" min="1"></div>
    </div>
    <div style="margin-bottom:1.4rem;">
      <label class="fl" style="text-align:center;display:block;font-size:.88rem;">Bagaimana kepuasan Anda terhadap layanan kami?</label>
      <div style="display:flex;justify-content:center;gap:1.2rem;margin-top:.75rem;" id="fw"><div onclick="pf(this,1)" title="Sangat Tidak Puas" style="cursor:pointer;text-align:center;padding:.5rem;border-radius:10px;transition:all .2s;" onmouseover="this.style.background='#fef3c7'" onmouseout="if(!this.classList.contains('sel'))this.style.background='transparent'"><div style="font-size:2.6rem;">😞</div><div style="font-size:.7rem;color:#6b7280;margin-top:.25rem;">Sangat Tidak Puas</div></div><div onclick="pf(this,2)" title="Tidak Puas" style="cursor:pointer;text-align:center;padding:.5rem;border-radius:10px;transition:all .2s;" onmouseover="this.style.background='#fef3c7'" onmouseout="if(!this.classList.contains('sel'))this.style.background='transparent'"><div style="font-size:2.6rem;">😕</div><div style="font-size:.7rem;color:#6b7280;margin-top:.25rem;">Tidak Puas</div></div><div onclick="pf(this,3)" title="Cukup Puas" style="cursor:pointer;text-align:center;padding:.5rem;border-radius:10px;transition:all .2s;" onmouseover="this.style.background='#fef3c7'" onmouseout="if(!this.classList.contains('sel'))this.style.background='transparent'"><div style="font-size:2.6rem;">😐</div><div style="font-size:.7rem;color:#6b7280;margin-top:.25rem;">Cukup Puas</div></div><div onclick="pf(this,4)" title="Puas" style="cursor:pointer;text-align:center;padding:.5rem;border-radius:10px;transition:all .2s;" onmouseover="this.style.background='#fef3c7'" onmouseout="if(!this.classList.contains('sel'))this.style.background='transparent'"><div style="font-size:2.6rem;">😊</div><div style="font-size:.7rem;color:#6b7280;margin-top:.25rem;">Puas</div></div><div onclick="pf(this,5)" title="Sangat Puas" style="cursor:pointer;text-align:center;padding:.5rem;border-radius:10px;transition:all .2s;" onmouseover="this.style.background='#fef3c7'" onmouseout="if(!this.classList.contains('sel'))this.style.background='transparent'"><div style="font-size:2.6rem;">😄</div><div style="font-size:.7rem;color:#6b7280;margin-top:.25rem;">Sangat Puas</div></div></div>
      <input type="hidden" id="nk" value="">
    </div>
    <div class="fg"><label class="fl">Saran & Masukan</label><textarea class="fta" placeholder="Berikan saran untuk peningkatan layanan..." rows="3"></textarea></div>
    <button onclick="kirim()" class="btn bb" style="width:100%;justify-content:center;padding:.82rem;font-size:.92rem;"><span class="material-icons" style="font-size:.9rem;">send</span> Kirim Penilaian</button>
  </div>
</div>
<div class="demo-badge">🎓 Portfolio Demo</div>
<script>
function pf(el,v){document.querySelectorAll('#fw>div').forEach(d=>{d.classList.remove('sel');d.style.background='transparent';});el.classList.add('sel');el.style.background='#fef3c7';document.getElementById('nk').value=v;}
function kirim(){var v=document.getElementById('nk').value;if(!v){alert('Pilih tingkat kepuasan!');return;}var m=['','Terima kasih. Kami akan terus meningkatkan.','Maaf atas pengalaman kurang baik. Kami akan memperbaiki.','Terima kasih! Kami akan berusaha lebih baik.','Terima kasih! Senang bisa membantu.','Terima kasih! Kami sangat senang Anda sangat puas! 🎉'];alert(m[v]);}
</script>
</body></html>
